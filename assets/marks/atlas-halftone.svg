<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Atlas halftone mark">
  <defs>
    <clipPath id="dotClip"><circle cx="50" cy="50" r="45"/></clipPath>
    <pattern id="dotPat" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.1" fill="#141414"/>
    </pattern>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#dotPat)" clip-path="url(#dotClip)"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#141414" stroke-width="3"/>
</svg>
