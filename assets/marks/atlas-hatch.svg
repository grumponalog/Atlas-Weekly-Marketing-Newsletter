<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Atlas engraved hatch mark">
  <defs>
    <clipPath id="hatchClip"><circle cx="50" cy="50" r="45"/></clipPath>
    <pattern id="hatchPat" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-20)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#141414" stroke-width="2.2"/>
    </pattern>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#hatchPat)" clip-path="url(#hatchClip)"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#141414" stroke-width="3"/>
</svg>
