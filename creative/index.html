<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:title" content="Creative — Atlas">
<meta property="og:description" content="The week's best marketing creative — the work worth stealing from, and why it lands.">
<meta property="og:type" content="website">
<meta property="og:image" content="/assets/share/atlas-og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/assets/share/atlas-og.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=Bowlby+One+SC&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../assets/marks/favicon.svg">
<link rel="stylesheet" href="../assets/site.css">
</head>
<body>
<a class="btn-subscribe subscribe-corner" href="#subscribe">Subscribe</a>
<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true" focusable="false">
<symbol id="mk-atlas-mark" viewBox="0 0 100 100"><defs>
    <mask id="atlasShadow"><circle cx="50" cy="50" r="45" fill="#fff"/><ellipse cx="50" cy="50" rx="39" ry="45" fill="#000"/></mask>
  </defs>
  <circle cx="50" cy="50" r="45" fill="none" stroke="var(--ink)" stroke-width="3"/>
  <circle cx="50" cy="50" r="45" fill="var(--ink)" mask="url(#atlasShadow)"/>
  <ellipse cx="50" cy="50" rx="14" ry="45" fill="none" stroke="var(--ink)" stroke-width="3"/>
  <ellipse cx="50" cy="32" rx="34" ry="8" fill="none" stroke="var(--ink)" stroke-width="2.8"/>
  <ellipse cx="50" cy="50" rx="37" ry="8" fill="none" stroke="var(--ink)" stroke-width="3"/>
  <ellipse cx="50" cy="68" rx="34" ry="8" fill="none" stroke="var(--ink)" stroke-width="2.8"/></symbol>
</svg>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-lockup">
      <div class="hero-row">
        <svg class="hero-mark" viewBox="2 2 96 96" aria-hidden="true">
          <defs><mask id="heroGlobeShadow"><circle cx="50" cy="50" r="45" fill="#fff"/><ellipse cx="50" cy="50" rx="39" ry="45" fill="#000"/></mask></defs>
          <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="3"/>
          <circle cx="50" cy="50" r="45" fill="currentColor" mask="url(#heroGlobeShadow)"/>
          <ellipse cx="50" cy="50" rx="14" ry="45" fill="none" stroke="currentColor" stroke-width="3"/>
          <ellipse cx="50" cy="32" rx="34" ry="8" fill="none" stroke="currentColor" stroke-width="2.8"/>
          <ellipse cx="50" cy="50" rx="37" ry="8" fill="none" stroke="currentColor" stroke-width="3"/>
          <ellipse cx="50" cy="68" rx="34" ry="8" fill="none" stroke="currentColor" stroke-width="2.8"/>
        </svg>
        <h1 class="hero-title">Atlas</h1>
      </div>
      <div class="hero-sub">
        <p class="hero-pub">Creative Digest</p>
        <p class="hero-tagline">Move the world</p>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="issues">
    <p class="lead" style="margin:0 0 22px;">A companion to the Trends digest. Where Trends tracks what moved, Creative tracks what's good — a handful of standout pieces each week, shown, not just described.</p>
    <p class="kicker">All editions</p>
    <div id="edition-list"></div>
    <noscript>
      <p style="margin-top:20px;"><a href="/creative/2026-07-06">Read the latest edition — The First Cut →</a></p>
    </noscript>
  </div>

  <footer class="site-foot">
    <span><a href="/">← Trends digest</a></span>
    <span><a href="/about">About →</a></span>
    <span>Atlas — Creative</span>
  </footer>
</div>

<script>
/* ---------------------------------------------------------------
   CREATIVE EDITIONS INDEX
   To publish a new edition: create /creative/YYYY-MM-DD/index.html
   (scripts/new-creative.sh), then add one entry to the TOP of this
   array. Commit & push — Vercel redeploys automatically.
   --------------------------------------------------------------- */
var EDITIONS = [
  {
    num: "01",
    date: "Week of Jul 6, 2026",
    href: "/creative/2026-07-06",
    title: "The First Cut",
    dek: "The work worth stealing from this week — shown, with a short take on why each one lands.",
    picks: 6
  }
];

(function(){
  var host = document.getElementById('edition-list');
  if(host){
    host.innerHTML = EDITIONS.map(function(e, idx){
      return '' +
        '<a class="issue-card" href="' + e.href + '">' +
          '<div class="ic-meta">' +
            '<svg class="ic-stamp" aria-hidden="true"><use href="#mk-atlas-mark"/></svg>' +
            '<div class="num">' + e.num + '</div>' +
            '<div class="date">' + e.date + '</div>' +
            (idx === 0 ? '<div class="ic-new">New</div>' : '') +
          '</div>' +
          '<div class="ic-body">' +
            '<h2 class="ic-title">' + e.title + '</h2>' +
            '<p class="ic-dek">' + e.dek + '</p>' +
            '<div class="ic-read">' + e.picks + ' picks · see the edition</div>' +
          '</div>' +
        '</a>';
    }).join('');
  }
})();
</script>
<script src="../assets/hero-motion.js" defer></script>
</body>
</html>
